<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Borrow Book - YWCA Library</title>

    <!-- CSS Styles -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            margin: 0;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 25px;
            background: #3498db;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #2c3e50;
        }
    </style>
</head>

<body>

<header>
    <h1>YWCA Library Staff Portal</h1>
</header>

<div class="container">

    <h2>Borrow a Book</h2>

    <!-- Form submits directly to Google Apps Script Web App -->
    <form id="borrowForm" action="https://script.google.com/macros/s/AKfycbx_p4c5YZ0Evq5VXtw83CJb6yd0TNlfO8D_iEO09X_CAYh6Yxg_TwTQRbjRsZSoYOo9/exec" method="POST">
        <label>Book Number</label>
        <input type="text" name="BookNumber" placeholder="Enter book number" required>

        <label>Book Title</label>
        <input type="text" name="Title" placeholder="Enter book title" required>

        <label>Student Name</label>
        <input type="text" name="StudentName" placeholder="Enter student name" required>

        <label>Class</label>
        <input type="text" name="StudentClass" placeholder="Example: Class 4" required>

        <label>Date Borrowed</label>
        <input type="date" name="BorrowDate" required>

        <label>Return Date</label>
        <input type="date" name="ReturnDate" required>

        <button type="submit">Record Borrow</button>
    </form>

    <a class="back" href="index.html">← Back to Home</a>

</div>

<script>
    // Optional: show a success message after submitting
    document.getElementById('borrowForm').addEventListener('submit', function () {
        alert('Borrow recorded successfully!');
        this.reset();
    });
</script>

</body>
</html>
