<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>YWCA Library Staff Portal</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            margin: 0;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
        }

        button {
            width: 80%;
            padding: 15px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            color: white;
        }

        #addBookBtn {
            background: #e67e22;
        }

        #addBookBtn:hover {
            background: #d35400;
        }

        #borrowBtn {
            background: #3498db;
        }

        #borrowBtn:hover {
            background: #2980b9;
        }

        #returnBtn {
            background: #2ecc71;
        }

        #returnBtn:hover {
            background: #27ae60;
        }
    </style>
</head>

<body>

<header>
    <h1>YWCA Library Staff Portal</h1>
</header>

<div class="container">
    <h2>Library Management System</h2>

    <button id="addBookBtn" onclick="location.href='addbook.html'">Add Book</button><br>
    <button id="borrowBtn" onclick="location.href='borrow.html'">Borrow Book</button><br>
    <button id="returnBtn" onclick="location.href='return.html'">Return Book</button>
</div>

</body>

</html>
